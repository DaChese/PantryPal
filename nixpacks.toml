# Railway / Nixpacks build configuration for PantryPal
# Docs: https://nixpacks.com/docs/configuration/file

[phases.setup]
nixPkgs = ["php83", "php83Extensions.pdo", "php83Extensions.pdo_mysql", "php83Extensions.mysqli", "php83Extensions.curl", "php83Extensions.mbstring"]

[phases.build]
cmds = []

[start]
# Router script lets the built-in server serve static files (css, js) correctly
cmd = "php -S 0.0.0.0:$PORT -t public public/router.php"
